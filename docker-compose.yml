version: '3.8'

services:
  server:
    build:
      context: .
      target: server-prod
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # Add other env vars here
    restart: unless-stopped

  client:
    build:
      context: .
      target: client-prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
